services:
  api:
    build: .
    container_name: seasonxi-api
    ports:
      - "8800:8800"
    volumes:
      - ./remotion/public:/app/remotion/public
      - ./outputs:/app/outputs
      - ./configs:/app/configs
      - ./data:/app/data
      - ./.env:/app/.env:ro
      - "C:/Users/Storm Credit/Desktop/쇼츠/seasonXI:/app/obsidian_vault:ro"
    env_file: .env
    environment:
      - OBSIDIAN_VAULT_PATH=/app/obsidian_vault
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8800/api/search?q=messi')"]
      interval: 30s
      timeout: 10s
      retries: 3

  remotion:
    build: ./remotion
    container_name: seasonxi-remotion
    ports:
      - "3334:3334"
    volumes:
      - ./remotion/public:/app/public
      - ./outputs:/app/outputs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3334', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
