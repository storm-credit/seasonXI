<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, height=1920">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1920px;
    overflow: hidden;
    font-family: 'Montserrat', sans-serif;
    background: #0B0D12;
    position: relative;
  }

  /* Background gradient */
  .bg {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at 60% 40%, rgba(15,28,46,0.9) 0%, transparent 70%),
      radial-gradient(ellipse at 30% 80%, rgba(201,162,74,0.08) 0%, transparent 50%),
      linear-gradient(180deg, #0B0D12 0%, #0F1C2E 40%, #0B0D12 100%);
  }

  /* Card frame */
  .card-frame {
    position: absolute;
    inset: 40px;
    border: 1.5px solid rgba(201,162,74,0.4);
    border-radius: 24px;
    overflow: hidden;
  }

  .card-frame::before {
    content: '';
    position: absolute;
    inset: 8px;
    border: 1px solid rgba(201,162,74,0.15);
    border-radius: 18px;
    pointer-events: none;
  }

  /* Corner accents */
  .corner { position: absolute; width: 40px; height: 40px; }
  .corner-tl { top: 40px; left: 40px; border-top: 3px solid #C9A24A; border-left: 3px solid #C9A24A; border-radius: 24px 0 0 0; }
  .corner-tr { top: 40px; right: 40px; border-top: 3px solid #C9A24A; border-right: 3px solid #C9A24A; border-radius: 0 24px 0 0; }
  .corner-bl { bottom: 40px; left: 40px; border-bottom: 3px solid #C9A24A; border-left: 3px solid #C9A24A; border-radius: 0 0 0 24px; }
  .corner-br { bottom: 40px; right: 40px; border-bottom: 3px solid #C9A24A; border-right: 3px solid #C9A24A; border-radius: 0 0 24px 0; }

  /* Player image */
  .player-image {
    position: absolute;
    bottom: 320px;
    left: 50%;
    transform: translateX(-40%);
    width: 820px;
    height: 1100px;
    object-fit: contain;
    object-position: bottom center;
    z-index: 2;
    filter: brightness(1.05) contrast(1.05);
  }

  /* Image glow */
  .player-glow {
    position: absolute;
    bottom: 300px;
    left: 50%;
    transform: translateX(-40%);
    width: 700px;
    height: 700px;
    background: radial-gradient(ellipse, rgba(201,162,74,0.12) 0%, transparent 70%);
    z-index: 1;
  }

  /* Top left: name, season, position */
  .player-info {
    position: absolute;
    top: 90px;
    left: 90px;
    z-index: 10;
  }

  .player-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 72px;
    color: #F5F7FA;
    letter-spacing: 3px;
    line-height: 1;
    text-transform: uppercase;
    text-shadow: 0 2px 20px rgba(0,0,0,0.8);
  }

  .player-meta {
    display: flex;
    gap: 20px;
    margin-top: 12px;
    align-items: center;
  }

  .season-badge {
    font-family: 'Montserrat', sans-serif;
    font-weight: 600;
    font-size: 28px;
    color: #C9A24A;
    letter-spacing: 1px;
  }

  .position-badge {
    font-family: 'Montserrat', sans-serif;
    font-weight: 700;
    font-size: 24px;
    color: #F5F7FA;
    background: rgba(201,162,74,0.2);
    border: 1px solid rgba(201,162,74,0.4);
    padding: 4px 16px;
    border-radius: 6px;
    letter-spacing: 2px;
  }

  .club-name {
    font-family: 'Montserrat', sans-serif;
    font-weight: 500;
    font-size: 22px;
    color: rgba(245,247,250,0.6);
    margin-top: 8px;
    letter-spacing: 1px;
  }

  /* OVR badge - top right */
  .ovr-container {
    position: absolute;
    top: 80px;
    right: 90px;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .ovr-badge {
    width: 160px;
    height: 160px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .ovr-badge::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(201,162,74,0.3), rgba(201,162,74,0.1));
    border: 2px solid #C9A24A;
    border-radius: 50%;
  }

  .ovr-number {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 96px;
    color: #E2C674;
    line-height: 1;
    text-shadow: 0 0 30px rgba(201,162,74,0.4);
    position: relative;
    z-index: 1;
  }

  .ovr-label {
    font-family: 'Montserrat', sans-serif;
    font-weight: 700;
    font-size: 18px;
    color: rgba(201,162,74,0.8);
    letter-spacing: 4px;
    position: relative;
    z-index: 1;
    margin-top: -8px;
  }

  /* Stats panel - bottom */
  .stats-panel {
    position: absolute;
    bottom: 60px;
    left: 60px;
    right: 60px;
    z-index: 10;
    background: linear-gradient(180deg, rgba(11,13,18,0.85) 0%, rgba(11,13,18,0.95) 100%);
    border: 1px solid rgba(201,162,74,0.25);
    border-radius: 16px;
    padding: 32px 40px;
    backdrop-filter: blur(10px);
  }

  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px 60px;
  }

  .stat-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 0;
    border-bottom: 1px solid rgba(201,162,74,0.1);
  }

  .stat-name {
    font-family: 'Montserrat', sans-serif;
    font-weight: 600;
    font-size: 24px;
    color: rgba(245,247,250,0.8);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .stat-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 42px;
    color: #E2C674;
    line-height: 1;
  }

  /* Tier badge */
  .tier-badge {
    position: absolute;
    bottom: 295px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    letter-spacing: 8px;
    padding: 6px 28px;
    border: 1.5px solid rgba(201,162,74,0.5);
    border-radius: 8px;
    background: rgba(11,13,18,0.7);
    backdrop-filter: blur(5px);
  }

  .tier-mythic { color: #FFD700; border-color: #FFD700; text-shadow: 0 0 20px rgba(255,215,0,0.4); }
  .tier-legendary { color: #E2C674; border-color: #C9A24A; }
  .tier-elite { color: #A8B8D0; border-color: #7890A8; }
  .tier-gold { color: #C9A24A; border-color: rgba(201,162,74,0.5); }

  /* Brand watermark */
  .brand {
    position: absolute;
    bottom: 16px;
    right: 70px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    color: rgba(201,162,74,0.3);
    letter-spacing: 4px;
    z-index: 10;
  }

  /* Tagline */
  .tagline {
    position: absolute;
    bottom: 270px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    font-family: 'Montserrat', sans-serif;
    font-weight: 600;
    font-size: 22px;
    color: rgba(245,247,250,0.5);
    letter-spacing: 2px;
    text-align: center;
    white-space: nowrap;
  }
</style>
</head>
<body>
  <div class="bg"></div>

  <!-- Card frame -->
  <div class="card-frame"></div>
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <!-- Player glow -->
  <div class="player-glow"></div>

  <!-- Player image -->
  <img class="player-image" src="{{PLAYER_IMAGE}}" alt="{{PLAYER_NAME}}">

  <!-- Top left: Player info -->
  <div class="player-info">
    <div class="player-name">{{PLAYER_NAME}}</div>
    <div class="player-meta">
      <span class="season-badge">{{SEASON}}</span>
      <span class="position-badge">{{POSITION}}</span>
    </div>
    <div class="club-name">{{CLUB}}</div>
  </div>

  <!-- Top right: OVR -->
  <div class="ovr-container">
    <div class="ovr-badge">
      <span class="ovr-number">{{OVR}}</span>
      <span class="ovr-label">OVR</span>
    </div>
  </div>

  <!-- Tier badge -->
  <div class="tier-badge tier-{{TIER_CLASS}}">{{TIER}} SEASON</div>

  <!-- Tagline -->
  <div class="tagline">{{TAGLINE}}</div>

  <!-- Stats panel -->
  <div class="stats-panel">
    <div class="stats-grid">
      <div class="stat-row">
        <span class="stat-name">Finishing</span>
        <span class="stat-value">{{FINISHING}}</span>
      </div>
      <div class="stat-row">
        <span class="stat-name">Playmaking</span>
        <span class="stat-value">{{CREATION}}</span>
      </div>
      <div class="stat-row">
        <span class="stat-name">Dribbling</span>
        <span class="stat-value">{{CONTROL}}</span>
      </div>
      <div class="stat-row">
        <span class="stat-name">Defense</span>
        <span class="stat-value">{{DEFENSE}}</span>
      </div>
      <div class="stat-row">
        <span class="stat-name">Clutch</span>
        <span class="stat-value">{{CLUTCH}}</span>
      </div>
      <div class="stat-row">
        <span class="stat-name">Aura</span>
        <span class="stat-value">{{AURA}}</span>
      </div>
    </div>
  </div>

  <!-- Brand -->
  <div class="brand">SEASONXI</div>
</body>
</html>
